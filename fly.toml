app = "beybladex"
primary_region = "sin"

[build]

[env]
  APP_ENV = "production"
  APP_DEBUG = "false"
  LOG_CHANNEL = "stderr"
  DB_CONNECTION = "sqlite"
  SESSION_DRIVER = "file"
  CACHE_STORE = "file"
  QUEUE_CONNECTION = "sync"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "data"
  destination = "/var/www/html/database"
